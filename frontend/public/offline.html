<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#020617" />
    <title>GESTÃO DE PLANTÕES Offline</title>
    <style>
      :root {
        color-scheme: dark;
        --bg-top: rgba(34, 197, 94, 0.22);
        --bg-main: #020617;
        --bg-mid: #0f172a;
        --bg-card: rgba(15, 23, 42, 0.84);
        --border: rgba(148, 163, 184, 0.18);
        --text: #e2e8f0;
        --muted: #94a3b8;
        --accent: #34d399;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        color: var(--text);
        background:
          radial-gradient(circle at top, var(--bg-top), transparent 30%),
          linear-gradient(180deg, var(--bg-main) 0%, var(--bg-mid) 52%, #111827 100%);
        padding: 24px;
      }

      main {
        width: min(100%, 440px);
        border: 1px solid var(--border);
        border-radius: 32px;
        background: var(--bg-card);
        padding: 32px;
        box-shadow: 0 30px 80px rgba(2, 6, 23, 0.45);
      }

      .tag {
        margin: 0 0 12px;
        color: var(--accent);
        font-size: 12px;
        letter-spacing: 0.28em;
        text-transform: uppercase;
      }

      h1 {
        margin: 0;
        font-size: clamp(2rem, 6vw, 2.6rem);
        line-height: 1;
      }

      p {
        margin: 18px 0 0;
        color: var(--muted);
        line-height: 1.6;
      }

      a {
        display: inline-block;
        margin-top: 24px;
        padding: 14px 18px;
        border-radius: 18px;
        text-decoration: none;
        color: #020617;
        background: var(--accent);
        font-weight: 700;
      }
    </style>
  </head>
  <body>
    <main>
      <p class="tag">GESTÃO DE PLANTÕES</p>
      <h1>Sem conexão no momento</h1>
      <p>Abra novamente quando a internet voltar para sincronizar os dados mais recentes dos plantões e acessos.</p>
      <a href="/">Tentar novamente</a>
    </main>
  </body>
</html>
